<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Jankenpun
    </title>
</head>
<body> 
    <div class="container">
        <div class="top">
            <h1 class="title">CACHIPUN</h1>

            <div class="match-container">
                <h2 class="h2">Make Your Choice</h2>
                    <div class="user-side">
                        <button class = "btn"><img class = "img" src="./images/rock.jpg" alt="rock"></button>
                        <button class = "btn"><img class = "img" src="./images/paper.jpg" alt="paper"></button>
                        <button class = "btn"><img class = "img" src="./images/scissors.jpg" alt="scissors"></button>
                    </div>
                    
            </div>
        </div>      
        <div class="bottom">

            <div class="result-box">
                <div class="result">
                    <h2 class="h2 h2-result">The winner is :</h2> 
                </div>
            </div>
            
            <div class="score-box">
                <h2 class="h2 h2-score">Score</h2>
                <div class="score">
                   
                    <div class="user-score-screen">0</div>

                    <div class="pc-score-screen">0</div>
                </div>
            </div>

        </div>
    </div>
    <script src="./script.js"></script>
</body>
</html>
